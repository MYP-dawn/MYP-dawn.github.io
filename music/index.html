<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>音乐播放器</title>

<style>
body {
  font-family: -apple-system;
  background: #f2f3f5;
  padding: 20px;
}

h2 {
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
}

input {
  width: 120px;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #ff4d4f;
  color: white;
  cursor: pointer;
}

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.song-info {
  cursor: pointer;
}

.song-name {
  font-weight: bold;
}

.artist {
  font-size: 12px;
  color: gray;
}

.star {
  cursor: pointer;
  font-size: 18px;
}

.active {
  color: gold;
}

#player {
  margin-top: 20px;
  width: 100%;
}

/* 新页面样式：风景图替换黑胶唱片风格 */
#songPage {
  display: none;
  background-color: #000;
  color: white;
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: relative;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}

#closeBtn:hover {
  color: #ff4d4f;
}

/* 不旋转的风景图 */
#disc {
  width: 200px;
  height: 200px;
  margin: 40px auto;
  border-radius: 50%;
  background-image: url('https://b0.bdstatic.com/15f97cf6b3a5b30613647546516d3b92.jpg');
  background-size: cover;
  position: relative;
}

.song-name {
  font-size: 20px;
  font-weight: bold;
}

.artist-name {
  font-size: 14px;
  color: gray;
}

.lyrics {
  margin-top: 20px;
  font-size: 14px;
  color: #bbb;
}

.controls {
  margin-top: 30px;
}

button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  margin: 10px;
}

button:hover {
  color: #ff4d4f;
}

/* 收藏按钮 */
#favBtn {
  font-size: 24px;
  cursor: pointer;
}

#favBtn.active {
  color: red;
}
</style>

</head>

<body>

<h2>🎧 音乐播放器</h2>

<div class="top-bar">
  <input id="keyword" placeholder="歌曲">
  <button onclick="search()">搜索</button>
  <button onclick="showFavorites()">❤收藏</button>
</div>

<div id="list"></div>

<audio id="player" controls></audio>

<!-- 新页面：歌曲播放详情 -->
<div id="songPage">
  <div id="closeBtn" onclick="closePlayer()">×</div>
  
  <div id="disc">
    <img id="coverImage" width="180" height="180" style="border-radius: 50%;" />
  </div>

  <div id="songName" class="song-name"></div>
  <div id="artistName" class="artist-name"></div>

  <div id="lyrics" class="lyrics">加载歌词...</div>

  <div class="controls">
    <button onclick="prevSong()">⏮ 上一曲</button>
    <button onclick="togglePlayPause()">⏯ 播放/暂停</button>
    <button onclick="nextSong()">⏭ 下一曲</button>
    <button id="favBtn" onclick="toggleFav()">❤️ 收藏</button>
  </div>
</div>

<script>
// 接口设置：多个备用接口，尝试不同平台
const sources = [
  {
    name: "网易",
    search: (k) => `https://api.imjad.cn/cloudmusic/?type=search&s=${k}`,
    song: (id) => `https://api.imjad.cn/cloudmusic/?type=song&id=${id}`,
    parseSearch: (data) => data.result.songs.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artists[0].name
    })),
    parseUrl: (data) => data.data[0].url,
    parseLyrics: (data) => data.lyrics || "暂无歌词"
  },
  {
    name: "QQ音乐",
    search: (k) => `https://music-api.gdstudio.xyz/api.php?types=search&source=netease&name=${k}`,
    song: (id) => `https://music-api.gdstudio.xyz/api.php?types=url&source=netease&id=${id}`,
    parseSearch: (data) => data.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artist
    })),
    parseUrl: (data) => data.url,
    parseLyrics: (data) => data.lyrics || "暂无歌词"
  },
  {
    name: "酷狗",
    search: (k) => `https://api.kugou.com/v1/search?keyword=${k}`,
    song: (id) => `https://api.kugou.com/v1/song?sid=${id}`,
    parseSearch: (data) => data.data.songs.map(s => ({
      id: s.song_id,
      name: s.song_name,
      artist: s.artist_name
    })),
    parseUrl: (data) => data.data.url,
    parseLyrics: (data) => data.lyrics || "暂无歌词"
  }
];

let currentSongs = [];
let currentSongIndex = 0;
let isPlaying = false;

// 搜索功能
async function search() {
  const k = document.getElementById("keyword").value;
  const listEl = document.getElementById("list");
  listEl.innerHTML = "搜索中...";

  for (let s of sources) {
    try {
      const res = await fetch(s.search(k));
      const data = await res.json();
      let songs = s.parseSearch(data);

      if (songs.length) {
        currentSongs = songs;
        renderList(songs);
        return;
      }
    } catch(e) {}
  }

  listEl.innerHTML = "没有找到结果";
}

// 渲染搜索列表
function renderList(songs) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.slice(0, 20).forEach(song => {
    const div = document.createElement("div");
    div.className = "card";

    const left = document.createElement("div");
    left.className = "song-info";
    left.innerHTML = `
      <div class="song-name">${song.name}</div>
      <div class="artist">${song.artist}</div>
    `;

    left.onclick = () => play(song.id);

    div.appendChild(left);
    list.appendChild(div);
  });
}

// 播放歌曲并进入新的页面
async function play(id) {
  const song = currentSongs.find(s => s.id === id);
  const player = document.getElementById("player");

  // 隐藏歌曲列表，显示播放器页面
  document.getElementById("list").style.display = "none";
  document.getElementById("songPage").style.display = "block";

  for (let s of sources) {
    try {
      const res = await fetch(s.song(id));
      const data = await res.json();
      const url = s.parseUrl(data);

      if (url) {
        player.src = url;
        player.play();
        isPlaying = true;
        showSongPage(song, s);
        return;
      }
    } catch(e) {}
  }

  alert("播放失败");
}

// 显示歌曲详情页面
async function showSongPage(song, source) {
  document.getElementById("songName").innerText = song.name;
  document.getElementById("artistName").innerText = song.artist;
  
  // 设置封面
  document.getElementById("coverImage").src = `https://p2.music.126.net/${song.id}.jpg`; // 使用默认封面
  
  // 显示歌词
  const lyrics = await fetchLyrics(song.id, source);
  document.getElementById("lyrics").innerText = lyrics;

  // 更新收藏按钮状态
  const favBtn = document.getElementById("favBtn");
  if (isFav(song.id)) {
    favBtn.classList.add("active"); // 已收藏，心形变红
  } else {
    favBtn.classList.remove("active"); // 未收藏，心形为白色
  }
}

// 获取歌词
async function fetchLyrics(id, source) {
  try {
    const res = await fetch(source.song(id));
    const data = await res.json();
    return source.parseLyrics(data);
  } catch (e) {
    return "歌词未找到";
  }
}

// 判断是否收藏
function isFav(id) {
  return getFav().some(s => s.id === id);
}

// 获取收藏
function getFav() {
  return JSON.parse(localStorage.getItem("fav") || "[]");
}

// 切换收藏状态
function toggleFav() {
  const song = currentSongs[currentSongIndex];
  let fav = getFav();

  const index = fav.findIndex(s => s.id === song.id);
  if (index === -1) {
    fav.push(song);
  } else {
    fav.splice(index, 1);
  }

  localStorage.setItem("fav", JSON.stringify(fav));

  // 更新收藏按钮的状态
  const favBtn = document.getElementById("favBtn");
  if (index === -1) {
    favBtn.classList.add("active"); // 收藏后显示为红色
    alert("已收藏");
  } else {
    favBtn.classList.remove("active"); // 取消收藏后恢复为白色
    alert("已取消收藏");
  }
}

// 返回按钮
function closePlayer() {
  document.getElementById("songPage").style.display = "none";
  document.getElementById("list").style.display = "block";
}

// 播放/暂停
function togglePlayPause() {
  const player = document.getElementById("player");
  const disc = document.getElementById("disc");

  if (isPlaying) {
    player.pause();
    disc.classList.add("pause"); // 暂停时停止旋转
    isPlaying = false;
  } else {
    player.play();
    disc.classList.remove("pause"); // 播放时恢复旋转
    isPlaying = true;
  }
}

// 上一曲
function prevSong() {
  currentSongIndex = (currentSongIndex - 1 + currentSongs.length) % currentSongs.length;
  play(currentSongs[currentSongIndex].id);
}

// 下一曲
function nextSong() {
  currentSongIndex = (currentSongIndex + 1) % currentSongs.length;
  play(currentSongs[currentSongIndex].id);
}

// 显示收藏页面
function showFavorites() {
  const fav = getFav();
  currentSongs = fav;
  renderList(fav);
}
</script>

</body>
</html>
