<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}

/* 搜索页 */
#searchPage {
  padding:15px;
}

input {
  width:120px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:10px;
  background:#ff4d4f;
  color:white;
}

.card {
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

/* 播放器页 */
#playerPage {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
}

.disc {
  width:220px;
  height:220px;
  margin:80px auto;
  border-radius:50%;
  background:#222;
  animation:spin 6s linear infinite;
}

.disc.pause {
  animation-play-state:paused;
}

@keyframes spin {
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.center {
  text-align:center;
}

.controls {
  text-align:center;
  margin-top:20px;
}

.controls button {
  background:none;
  font-size:20px;
}

.topbar {
  padding:10px;
}
</style>

</head>

<body>

<!-- 搜索页 -->
<div id="searchPage">
<h3>🎧 音乐播放器</h3>

<input id="kw">
<button onclick="search()">搜索</button>

<div id="list"></div>
</div>

<!-- 播放器页 -->
<div id="playerPage">

<div class="topbar">
<button onclick="back()">← 返回</button>
</div>

<div class="center">
<div id="disc" class="disc"></div>

<div id="pname"></div>
<div id="partist"></div>
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
<button onclick="fav()">❤️</button>
</div>

</div>

<audio id="audio"></audio>

<script>
// 多源接口（自动兜底）
const apis = [
  {
    search: k => `https://api.imjad.cn/cloudmusic/?type=search&s=${k}`,
    song: id => `https://api.imjad.cn/cloudmusic/?type=song&id=${id}`,
    parseSearch: d => d.result?.songs || [],
    parseUrl: d => d.data?.[0]?.url
  },
  {
    search: k => `https://music-api.gdstudio.xyz/api.php?types=search&source=netease&name=${k}`,
    song: id => `https://music-api.gdstudio.xyz/api.php?types=url&source=netease&id=${id}`,
    parseSearch: d => d || [],
    parseUrl: d => d.url
  }
];

// 数据
let listData = [];
let current = 0;

// 搜索
async function search(){
  const k = document.getElementById("kw").value;

  for (let api of apis) {
    try {
      const res = await fetch(api.search(k));
      const data = await res.json();
      const songs = api.parseSearch(data);

      if (songs && songs.length) {
        listData = songs;
        render();
        return;
      }
    } catch(e){}
  }

  alert("搜索失败（接口挂了）");
}

// 渲染搜索结果
function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";

  listData.slice(0,20).forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `${s.name} - ${s.artists[0].name}`;
    div.onclick = ()=> playSong(i);
    el.appendChild(div);
  });
}

// 播放
async function playSong(i){
  current = i;
  const song = listData[i];

  document.getElementById("pname").innerText = song.name;
  document.getElementById("partist").innerText =
    song.artists?.[0]?.name || song.artist;

  const audio = document.getElementById("audio");

  for (let api of apis) {
    try {
      const res = await fetch(api.song(song.id));
      const data = await res.json();
      const url = api.parseUrl(data);

      if (url) {
        audio.src = url;
        audio.play();

        document.getElementById("playerPage").style.display = "block";
        document.getElementById("disc").classList.remove("pause");
        return;
      }
    } catch(e){}
  }

  alert("所有音源都无法播放");
}

// 播放/暂停
function toggle(){
  const a = document.getElementById("audio");
  const disc = document.getElementById("disc");

  if(a.paused){
    a.play();
    disc.classList.remove("pause");
  }else{
    a.pause();
    disc.classList.add("pause");
  }
}

// 上一首
function prev(){
  current = (current -1 + listData.length)%listData.length;
  playSong(current);
}

// 下一首
function next(){
  current = (current +1)%listData.length;
  playSong(current);
}

// 返回
function back(){
  document.getElementById("playerPage").style.display = "none";
}

// 收藏
function fav(){
  const song = listData[current];
  let fav = JSON.parse(localStorage.getItem("fav")||"[]");

  if(!fav.find(s=>s.id===song.id)){
    fav.push(song);
    alert("已收藏");
  }

  localStorage.setItem("fav",JSON.stringify(fav));
}
</script>

</body>
</html>
