<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>音乐播放器</title>

<style>
body {
  font-family: -apple-system;
  background: #f2f3f5;
  padding: 20px;
}

h2 {
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
}

input {
  width: 120px;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #ff4d4f;
  color: white;
  cursor: pointer;
}

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.song-info {
  cursor: pointer;
}

.song-name {
  font-weight: bold;
}

.artist {
  font-size: 12px;
  color: gray;
}

.star {
  cursor: pointer;
  font-size: 18px;
}

.active {
  color: gold;
}

#player {
  margin-top: 20px;
  width: 100%;
}

#songPage {
  display: none;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.lyrics {
  margin-top: 20px;
  font-size: 14px;
  color: #555;
}
</style>

</head>

<body>

<h2>🎧 音乐播放器</h2>

<div class="top-bar">
  <input id="keyword" placeholder="歌曲">
  <button onclick="search()">搜索</button>
  <button onclick="showFavorites()">❤收藏</button>
</div>

<div id="list"></div>

<audio id="player" controls></audio>

<!-- 新页面显示歌曲信息 -->
<div id="songPage">
  <h3 id="songName"></h3>
  <p id="songArtist"></p>
  <div>
    <img id="coverImage" width="200" />
  </div>
  <div class="lyrics" id="lyrics"></div>
  <div class="controls">
    <button onclick="prev()">⏮ 上一曲</button>
    <button onclick="togglePlayPause()">⏯ 播放/暂停</button>
    <button onclick="next()">⏭ 下一曲</button>
  </div>
</div>

<script>
const sources = [
  {
    name: "网易",
    search: (k) => `https://api.imjad.cn/cloudmusic/?type=search&s=${k}`,
    song: (id) => `https://api.imjad.cn/cloudmusic/?type=song&id=${id}`,
    parseSearch: (data) => data.result.songs.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artists[0].name
    })),
    parseUrl: (data) => data.data[0].url,
    parseLyrics: (data) => data.lyrics || "暂无歌词"
  },
  {
    name: "备用",
    search: (k) => `https://music-api.gdstudio.xyz/api.php?types=search&source=netease&name=${k}`,
    song: (id) => `https://music-api.gdstudio.xyz/api.php?types=url&source=netease&id=${id}`,
    parseSearch: (data) => data.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artist
    })),
    parseUrl: (data) => data.url,
    parseLyrics: (data) => data.lyrics || "暂无歌词"
  }
];

// 收藏缓存
function getFav() {
  return JSON.parse(localStorage.getItem("fav") || "[]");
}

function saveFav(list) {
  localStorage.setItem("fav", JSON.stringify(list));
}

function toggleFav(song) {
  let fav = getFav();
  const index = fav.findIndex(s => s.id === song.id);

  if (index > -1) {
    fav.splice(index, 1);
  } else {
    fav.push(song);
  }

  saveFav(fav);
  renderList(currentSongs);
}

// 判断是否收藏
function isFav(id) {
  return getFav().some(s => s.id === id);
}

// 排序优化（优先原唱）
function sortSongs(list, keyword) {
  return list.sort((a, b) => {
    const score = (s) => {
      let val = 0;
      if (s.name.includes(keyword)) val += 10;
      if (s.artist.includes(keyword)) val += 5;
      if (s.name === keyword) val += 20;
      return val;
    };
    return score(b) - score(a);
  });
}

let currentSongs = [];
let currentSong = null;

// 搜索
async function search() {
  const k = document.getElementById("keyword").value;
  const listEl = document.getElementById("list");
  listEl.innerHTML = "搜索中...";

  for (let s of sources) {
    try {
      const res = await fetch(s.search(k));
      const data = await res.json();
      let songs = s.parseSearch(data);

      if (songs.length) {
        songs = sortSongs(songs, k);
        currentSongs = songs;
        renderList(songs);
        return;
      }
    } catch(e) {}
  }

  listEl.innerHTML = "没有结果";
}

// 渲染列表
function renderList(songs) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.slice(0, 20).forEach(song => {
    const div = document.createElement("div");
    div.className = "card";

    const left = document.createElement("div");
    left.className = "song-info";
    left.innerHTML = `
      <div class="song-name">${song.name}</div>
      <div class="artist">${song.artist}</div>
    `;

    left.onclick = () => play(song.id);

    const star = document.createElement("div");
    star.className = "star " + (isFav(song.id) ? "active" : "");
    star.innerText = "★";
    star.onclick = (e) => {
      e.stopPropagation();
      toggleFav(song);
    };

    div.appendChild(left);
    div.appendChild(star);

    list.appendChild(div);
  });
}

// 播放
async function play(id) {
  const player = document.getElementById("player");

  for (let s of sources) {
    try {
      const res = await fetch(s.song(id));
      const data = await res.json();
      const url = s.parseUrl(data);

      if (url) {
        player.src = url;
        player.play();
        currentSong = id;

        // 显示歌曲详情
        showSongPage(id);
        return;
      }
    } catch(e) {}
  }

  alert("播放失败");
}

// 显示歌曲详情页
async function showSongPage(id) {
  const song = currentSongs.find(s => s.id === id);
  const songPage = document.getElementById("songPage");
  const lyrics = await fetchLyrics(id);

  document.getElementById("songName").innerText = song.name;
  document.getElementById("songArtist").innerText = song.artist;
  document.getElementById("coverImage").src = `https://p2.music.126.net/${song.id}.jpg`; // 示例封面图

  document.getElementById("lyrics").innerText = lyrics || "歌词暂未加载";

  songPage.style.display = "block";
}

// 获取歌词
async function fetchLyrics(id) {
  for (let s of sources) {
    try {
      const res = await fetch(s.song(id));
      const data = await res.json();
      return s.parseLyrics(data);
    } catch(e) {}
  }
  return "未找到歌词";
}

// 返回按钮
function back() {
  document.getElementById("songPage").style.display = "none";
}

// 播放/暂停
function togglePlayPause() {
  const player = document.getElementById("player");
  if (player.paused) {
    player.play();
  } else {
    player.pause();
  }
}

// 上一曲
function prev() {
  currentSong = (currentSong - 1 + currentSongs.length) % currentSongs.length;
  play(currentSongs[currentSong].id);
}

// 下一曲
function next() {
  currentSong = (currentSong + 1) % currentSongs.length;
  play(currentSongs[currentSong].id);
}

// 收藏页
function showFavorites() {
  const fav = getFav();
  currentSongs = fav;
  renderList(fav);
}
</script>

</body>
</html>
