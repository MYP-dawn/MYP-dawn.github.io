<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>多源音乐播放器</title>
<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
input { width: 70%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;}
button { padding: 10px 15px; border:none; border-radius:8px; background:#ff4d4f; color:white;}
li { padding:10px; margin:5px 0; background:white; border-radius:8px; cursor:pointer;}
li:hover { background:#eee; }
</style>
</head>

<body>

<h2>🎧 多源音乐播放器</h2>

<input id="keyword" placeholder="输入歌曲名">
<button onclick="search()">搜索</button>

<ul id="list"></ul>

<audio id="player" controls style="width:100%; margin-top:20px;"></audio>

<script>
const sources = [
  {
    name: "网易源",
    search: (k) => `https://api.imjad.cn/cloudmusic/?type=search&s=${k}`,
    song: (id) => `https://api.imjad.cn/cloudmusic/?type=song&id=${id}`,
    parseSearch: (data) => data.result.songs.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artists[0].name
    })),
    parseUrl: (data) => data.data[0].url
  },
  {
    name: "备用源",
    search: (k) => `https://music-api.gdstudio.xyz/api.php?types=search&source=netease&name=${k}`,
    song: (id) => `https://music-api.gdstudio.xyz/api.php?types=url&source=netease&id=${id}`,
    parseSearch: (data) => data.map(s => ({
      id: s.id,
      name: s.name,
      artist: s.artist
    })),
    parseUrl: (data) => data.url
  }
];

async function search() {
  const k = document.getElementById("keyword").value;
  const list = document.getElementById("list");
  list.innerHTML = "搜索中...";

  for (let source of sources) {
    try {
      const res = await fetch(source.search(k));
      const data = await res.json();
      const songs = source.parseSearch(data);

      if (songs && songs.length) {
        renderList(songs, source);
        return;
      }
    } catch(e) {
      console.log(source.name + "失败");
    }
  }

  list.innerHTML = "没有找到歌曲";
}

function renderList(songs, source) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.slice(0, 20).forEach(song => {
    const li = document.createElement("li");
    li.innerText = `${song.name} - ${song.artist} (${source.name})`;

    li.onclick = () => play(song.id);

    list.appendChild(li);
  });
}

async function play(id) {
  const player = document.getElementById("player");

  for (let source of sources) {
    try {
      const res = await fetch(source.song(id));
      const data = await res.json();
      const url = source.parseUrl(data);

      if (url) {
        player.src = url;
        player.play();
        console.log("使用源:", source.name);
        return;
      }
    } catch(e) {}
  }

  alert("所有音源都无法播放 😢");
}
</script>

</body>
</html>
